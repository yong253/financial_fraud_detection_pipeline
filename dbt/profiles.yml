# 단일 웨어하우스: BigQuery.
# dbt는 .env를 자동 로드하지 않으므로 env_var 기본값 필수.
fraud_dbt:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: service-account
      project:  "{{ env_var('GCP_PROJECT_ID', 'financial-pipeline-501007') }}"
      dataset:  "{{ env_var('BQ_DATASET_GOLD', 'fraud_gold') }}"
      keyfile:  "{{ env_var('GCP_KEYFILE', '/credentials/service_account.json') }}"
      location: "{{ env_var('GCP_REGION', 'asia-northeast3') }}"
      threads: 4
