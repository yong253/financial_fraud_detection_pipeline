version: 2

models:
  - name: undetected_fraud
    description: "기존 룰 미탐지 사기 집계 (isFraud=1 & isFlaggedFraud=0)"
    columns:
      - name: row_id
        description: "SHA-256 dedup 키 (무중복 보장)"
        data_tests:
          - not_null
          - unique
      - name: is_suspicious
        description: "전 행이 미탐지 사기여야 함"
        data_tests:
          - accepted_values:
              values: [true]
              quote: false   # BOOL 컬럼 → 'true'(문자열) 대신 true(리터럴)로 비교. BigQuery 엄격성 대응(DuckDB도 호환)
      - name: type
        description: "사기는 CASH_OUT/TRANSFER 유형에서만 발생"
        data_tests:
          - accepted_values:
              values: ['CASH_OUT', 'TRANSFER']

  - name: hourly_summary
    description: "시간대별 거래량/사기 집계"
    columns:
      - name: tx_hour
        data_tests:
          - not_null

  - name: account_risk
    description: "계좌별 누적 위험도 (사기 연루 계좌만)"
    columns:
      - name: account_id
        data_tests:
          - not_null
          - unique
      - name: fraud_tx_count
        data_tests:
          - not_null
