# ============================================================
#  Kafka 스택 — 3-브로커 KRaft 클러스터 (금융 데이터 정합성)
#  실행:  docker compose -f docker/docker-compose.yml up -d
#  확인:  http://localhost:8080  (Kafka UI 에서 브로커 3개 + transactions 토픽)
#
#  정합성 설정:
#   - RF=3, min.insync.replicas=2  → 브로커 1대 장애에도 무손실 + 쓰기 지속
#   - unclean.leader.election=false → stale 복제본 리더 승격 차단(커밋분 무손실)
#   - restart=unless-stopped        → 브로커 down 시 자동 회복
#   - named volume                  → 재시작해도 데이터 영속
#  Spark / Airflow / Prometheus / Grafana 는 이후 단계에서 추가
# ============================================================

name: fraud-pipeline

# 3노드 공통 환경변수 (YAML 앵커로 중복 제거)
x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.1
  restart: unless-stopped
  networks:
    - fraud-net
  healthcheck:
    test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
    interval: 10s
    timeout: 10s
    retries: 10
    start_period: 25s

x-kafka-env: &kafka-env
  # --- KRaft 모드 (broker + controller 겸용) ---
  KAFKA_PROCESS_ROLES: "broker,controller"
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:29093,2@kafka2:29093,3@kafka3:29093"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
  # --- 금융 정합성: 복제/내구성 ---
  KAFKA_DEFAULT_REPLICATION_FACTOR: 3
  KAFKA_MIN_INSYNC_REPLICAS: 2
  KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_NUM_PARTITIONS: 3
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

# Airflow 3개 서비스(init/webserver/scheduler) 공통 설정 — LocalExecutor
x-airflow-common: &airflow-common
  build:
    context: ${HOST_PROJECT_DIR:-..}/airflow
    dockerfile: Dockerfile
  image: fraud-airflow:local
  user: "50000:0"   # airflow UID 50000 + root그룹(GID 0) → docker.sock 접근
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # ⑥ 모니터링: Airflow 운영 메트릭을 StatsD(UDP)로 statsd-exporter에 전송.
    # statsd-exporter(monitoring profile)가 꺼져 있어도 UDP fire-and-forget이라 무해.
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: "9125"
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    # 주의: HOST_PROJECT_DIR는 컨테이너 env로 주지 않는다. 형제 잡 실행 시 .env의 절대값이
    # shell env에 가려지면 안 되기 때문. DAG BashOperator가 .env에서 직접 export 한다.
    PROJECT_COMPOSE_DIR: /opt/airflow/project
    # ── BigQuery(reconcile/push_metrics) 조회용. 프로젝트 마운트에 SA 키 포함 → 별도 마운트 불필요 ──
    GCP_PROJECT_ID: ${GCP_PROJECT_ID:-financial-pipeline-501007}
    BQ_DATASET_SILVER: ${BQ_DATASET_SILVER:-fraud_silver}
    BQ_DATASET_GOLD: ${BQ_DATASET_GOLD:-fraud_gold}
    # ── E단계: bronze_sensor GCS/BQ 센싱용 ──
    BQ_DATASET_BRONZE: ${BQ_DATASET_BRONZE:-fraud_bronze}
    FEED_DONE_URI: ${FEED_DONE_URI:-gs://financial-pipeline-501007-staging/_feed/ALL_DONE}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/project/credentials/service_account.json
    # ── D단계: Dataproc 제출(DataprocCreateBatchOperator) + GCS 코드 업로드용 ──
    GCP_REGION: ${GCP_REGION:-asia-northeast3}
    GCS_BUCKET_BRONZE: ${GCS_BUCKET_BRONZE:-financial-pipeline-501007-bronze}
    GCS_BUCKET_SILVER: ${GCS_BUCKET_SILVER:-financial-pipeline-501007-silver}
    GCS_BUCKET_STAGING: ${GCS_BUCKET_STAGING:-financial-pipeline-501007-staging}
    GCP_SA_EMAIL: ${GCP_SA_EMAIL:-financial-service@financial-pipeline-501007.iam.gserviceaccount.com}
    # google 프로바이더 기본 연결이 ADC(GOOGLE_APPLICATION_CREDENTIALS)를 쓰도록 — 별도 커넥션 설정 불필요
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: "google-cloud-platform://"
  volumes:
    - ${HOST_PROJECT_DIR:-..}/airflow/dags:/opt/airflow/dags
    - ${HOST_PROJECT_DIR:-..}/airflow/logs:/opt/airflow/logs
    - ${HOST_PROJECT_DIR:-..}/airflow/plugins:/opt/airflow/plugins
    - ${HOST_PROJECT_DIR:-..}:/opt/airflow/project   # compose 파일/잡 코드 접근
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - fraud-net

services:
  kafka1:
    <<: *kafka-common
    container_name: kafka1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka1:29092,PLAINTEXT_HOST://localhost:9092"
    volumes:
      - kafka1-data:/var/lib/kafka/data

  kafka2:
    <<: *kafka-common
    container_name: kafka2
    ports:
      - "9093:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka2:29092,PLAINTEXT_HOST://localhost:9093"
    volumes:
      - kafka2-data:/var/lib/kafka/data

  kafka3:
    <<: *kafka-common
    container_name: kafka3
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka3:29092,PLAINTEXT_HOST://localhost:9094"
    volumes:
      - kafka3-data:/var/lib/kafka/data

  # transactions 토픽 1회 생성(정합성 설정 포함) 후 종료
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka1:29092 --create --if-not-exists \
          --topic transactions --partitions 3 --replication-factor 3 \
          --config min.insync.replicas=2 \
          --config retention.ms=-1 \
          --config unclean.leader.election.enable=false
        echo "=== transactions 토픽 상세 (RF/ISR/min.insync 확인) ==="
        kafka-topics --bootstrap-server kafka1:29092 --describe --topic transactions
    networks:
      - fraud-net

  # ── E단계 수집: Kafka Connect + GCS Sink (상시 인제스트, DAG 밖) ──────────
  # 기동: docker compose -f docker/docker-compose.yml --profile connect up -d --build
  # profile=connect 전용(기본 up엔 안 뜸) — SA 키 없는 개발 환경 크래시 방지.
  kafka-connect:
    build:
      context: ${HOST_PROJECT_DIR:-..}/kafka/connect
      dockerfile: Dockerfile
    image: fraud-connect:local
    container_name: kafka-connect
    profiles: ["connect"]
    restart: unless-stopped
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka1:29092,kafka2:29092,kafka3:29092"
      CONNECT_GROUP_ID: "fraud-connect"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-status"
      # 정합성: 내부 토픽도 RF=3(브로커 1대 장애에도 커넥터 상태/오프셋 무손실)
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      GOOGLE_APPLICATION_CREDENTIALS: /credentials/service_account.json
    volumes:
      - ${HOST_PROJECT_DIR:-..}/credentials:/credentials:ro
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # gcs-sink-bronze 커넥터를 1회 등록(REST PUT) 후 종료. PUT은 멱등 — 재실행해도 config 갱신만.
  connect-init:
    image: curlimages/curl:latest
    container_name: connect-init
    profiles: ["connect"]
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ${HOST_PROJECT_DIR:-..}/kafka/connect:/config:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        curl -sS -X PUT -H "Content-Type: application/json" \
          --data @/config/gcs-sink-bronze.json \
          http://kafka-connect:8083/connectors/gcs-sink-bronze/config
    networks:
      - fraud-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka1:29092,kafka2:29092,kafka3:29092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    networks:
      - fraud-net

  # dbt (Silver → Gold). profile 지정으로 `up`엔 안 뜸.
  # 실행: docker compose -f docker/docker-compose.yml run --rm dbt run --profiles-dir .
  #       docker compose -f docker/docker-compose.yml run --rm dbt test --profiles-dir .
  dbt:
    build:
      context: ../dbt
      dockerfile: Dockerfile
    image: fraud-dbt:local
    profiles: ["jobs"]
    working_dir: /dbt
    environment:
      # ── BigQuery 타깃용. 값은 루트 .env에서 주입(없으면 기본값) ──
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-financial-pipeline-501007}
      BQ_DATASET_SILVER: ${BQ_DATASET_SILVER:-fraud_silver}
      BQ_DATASET_GOLD: ${BQ_DATASET_GOLD:-fraud_gold}
      GCP_REGION: ${GCP_REGION:-asia-northeast3}
      GCP_KEYFILE: /credentials/service_account.json
    volumes:
      - ${HOST_PROJECT_DIR:-..}/dbt:/dbt
      - ${HOST_PROJECT_DIR:-..}/credentials:/credentials:ro
    networks:
      - fraud-net
    command: ["run", "--profiles-dir", "."]

  # ── Airflow 스택 (⑤ 오케스트레이션, LocalExecutor) ──────────────────────
  airflow-postgres:
    image: postgres:13
    container_name: airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraud-net

  # DB 마이그레이션 + admin 유저 생성 후 종료
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname admin --lastname user --role Admin --email admin@example.com || true
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "8081:8080"   # kafka-ui가 8080 점유 → Airflow는 8081
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── ⑥ 모니터링 스택 (profile=monitoring) ──────────────────────────────────
  # 기동: docker compose -f docker/docker-compose.yml --profile monitoring up -d
  #   - Kafka 인제스트 헬스: kafka-exporter → Prometheus
  #   - Airflow 운영 메트릭: statsd-exporter → Prometheus
  #   - 배치 records + 사기 KPI: DAG가 Pushgateway로 push → Prometheus
  #   - 시각화: Grafana(단일 Prometheus 데이터소스, 대시보드/데이터소스 프로비저닝)

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ${HOST_PROJECT_DIR:-..}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - fraud-net

  pushgateway:
    image: prom/pushgateway:v1.9.0
    container_name: pushgateway
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - fraud-net

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka1:29092
      - --kafka.server=kafka2:29092
      - --kafka.server=kafka3:29092
    networks:
      - fraud-net

  statsd-exporter:
    image: prom/statsd-exporter:v0.27.1
    container_name: statsd-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9102:9102"     # Prometheus scrape (HTTP)
      - "9125:9125/udp" # Airflow StatsD 수신 (UDP)
    volumes:
      - ${HOST_PROJECT_DIR:-..}/prometheus/statsd_mapping.yml:/etc/statsd/mapping.yml:ro
    command:
      - --statsd.mapping-config=/etc/statsd/mapping.yml
      - --statsd.listen-udp=:9125
      - --web.listen-address=:9102
    networks:
      - fraud-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ${HOST_PROJECT_DIR:-..}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${HOST_PROJECT_DIR:-..}/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - fraud-net

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
  airflow-pg-data:
  prometheus-data:
  grafana-data:

networks:
  fraud-net:
    driver: bridge
