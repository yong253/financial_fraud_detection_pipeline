# Grafana 대시보드 프로바이더 — grafana/dashboards/*.json 자동 로드.
apiVersion: 1

providers:
  - name: fraud-dashboards
    orgId: 1
    folder: "Fraud Pipeline"
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
