name: CI                      # Actions 탭에 표시될 워크플로 이름

"on":                          # 언제 실행할지 (따옴표: YAML에서 on/off/yes/no는 예약된 불리언이라 문자열임을 명시)
  push:
    branches: [master]         # master에 push될 때
  pull_request:
    branches: [master]         # master로 향하는 PR이 열리거나 갱신될 때

jobs:
  lint-and-test:                # 잡 이름(임의로 지정 가능)
    runs-on: ubuntu-latest       # GitHub이 띄워주는 임시 우분투 VM에서 실행

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4       # 남이 만든 재사용 액션 — 이 저장소를 VM에 clone

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"        # 로컬 개발 환경과 동일 버전

      - name: 필요한 패키지 설치
        run: pip install ruff pytest pyyaml   # 이번 잡에 필요한 최소 패키지만

      - name: Lint (코드 스타일 검사)
        run: ruff check .

      - name: dbt 모델 컴파일 체크 (SQL/Jinja 문법 + ref 검증, GCP 인증 불필요)
        run: docker compose -f docker/docker-compose.yml run --rm dbt parse --profiles-dir .

      - name: Airflow 로그/플러그인 디렉토리 준비 (CI엔 없어서 root 소유로 자동생성되는 문제 방지)
        run: mkdir -p airflow/logs airflow/plugins && chmod -R 777 airflow/logs airflow/plugins

      - name: Airflow 스택 기동 (AF1/AF2용 — airflow-scheduler만, Kafka/GCP 키 불필요)
        run: docker compose -f docker/docker-compose.yml up -d --build airflow-scheduler

      - name: Airflow 스케줄러 준비 대기
        run: timeout 240 bash -c 'until docker exec airflow-scheduler airflow db check; do sleep 5; done'

      - name: Airflow DAG 테스트 (AF1 임포트·AF2 구조·AF7 reconcile·AF9 완결판정)
        run: pytest tests/test_airflow_dag.py -v

      - name: 실패 시 Airflow 로그 덤프
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs airflow-init airflow-postgres airflow-scheduler

      - name: Airflow 스택 정리
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

      - name: 모니터링 설정 테스트 (외부 서비스/자격증명 불필요)
        run: pytest tests/test_monitoring.py -m "not slow" -v
